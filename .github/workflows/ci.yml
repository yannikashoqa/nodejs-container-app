name: CI – Build, Test & TMAS Security Scan

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write   # required for tmas-scan-action to post PR comments

env:
  IMAGE_NAME: nodejs-container-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 1: Unit Tests
  # ──────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 2: TMAS Source Code Scan (vulnerabilities + secrets in repo)
  # ──────────────────────────────────────────────────────────────────────────────
  tmas-source-scan:
    name: TMAS – Source Code Scan
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: repo

      - name: TMAS – Scan repository (vulnerabilities + secrets)
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          version: "2"
          vulnerabilitiesScan: true
          malwareScan: false        # malware scan is for container images
          secretsScan: true
          artifact: dir:./repo
          additionalArgs: --region=${{ vars.TMAS_REGION || 'us-east-1' }}
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 3: Build Container Image
  # ──────────────────────────────────────────────────────────────────────────────
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-22.04
    needs: test
    outputs:
      tarball: ${{ steps.export.outputs.tarball }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            .

      - name: Export image to tarball
        id: export
        run: |
          TARBALL="${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}.tar"
          docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o $TARBALL
          echo "tarball=$TARBALL" >> $GITHUB_OUTPUT

      - name: Upload image tarball as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ${{ steps.export.outputs.tarball }}
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 4: TMAS Container Image Scan (vulnerabilities + malware + secrets)
  # ──────────────────────────────────────────────────────────────────────────────
  tmas-container-scan:
    name: TMAS – Container Image Scan
    runs-on: ubuntu-22.04
    needs: build-image
    steps:
      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: TMAS – Scan container image (all scanners)
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          version: "2"
          vulnerabilitiesScan: true
          malwareScan: true
          secretsScan: true
          # Scan the local image tarball (no registry push required)
          artifact: docker-archive:${{ needs.build-image.outputs.tarball }}
          additionalArgs: >
            --region=${{ vars.TMAS_REGION || 'us-east-1' }}
            --saveSBOM
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: SBOM.json
          retention-days: 30
