name: CI – Build, Test & TMAS Security Scan

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write   # required for tmas-scan-action to post PR comments
  packages: write        # required to push to GHCR

env:
  IMAGE_NAME: nodejs-container-app
  IMAGE_TAG: ${{ github.sha }}
  REGISTRY: ghcr.io

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 1: Unit Tests
  # ──────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install curl and jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq
          echo "curl $(curl --version | head -1)"
          echo "jq $(jq --version)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 2: TMAS Source Code Scan (vulnerabilities + secrets in repo)
  # ──────────────────────────────────────────────────────────────────────────────
  tmas-source-scan:
    name: TMAS – Source Code Scan
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Install curl and jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq
          echo "curl $(curl --version | head -1)"
          echo "jq $(jq --version)"

      - name: TMAS – Scan repository (vulnerabilities + secrets)
        uses: trendmicro/tmas-scan-action@v2
        with:
          version: "2"
          vulnerabilitiesScan: true
          malwareScan: false        # malware scan is for container images
          secretsScan: true
          artifact: dir:./repo
          additionalArgs: --region=${{ vars.TMAS_REGION || 'us-east-1' }}
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 3: Build & Push Container Image to GHCR
  # ──────────────────────────────────────────────────────────────────────────────
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-22.04
    needs: test
    outputs:
      tarball: ${{ steps.export.outputs.tarball }}
      image-ref: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install curl and jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq
          echo "curl $(curl --version | head -1)"
          echo "jq $(jq --version)"

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            .

      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Tag for GHCR and push
          GHCR_IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${GHCR_IMAGE}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${GHCR_IMAGE}:latest
          docker push ${GHCR_IMAGE}:${{ env.IMAGE_TAG }}
          docker push ${GHCR_IMAGE}:latest

      - name: Export image to tarball (for TMAS scan)
        id: export
        run: |
          TARBALL="${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}.tar"
          docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o $TARBALL
          echo "tarball=$TARBALL" >> $GITHUB_OUTPUT

      - name: Upload image tarball as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ${{ steps.export.outputs.tarball }}
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 4: TMAS Container Image Scan (vulnerabilities + malware + secrets)
  # ──────────────────────────────────────────────────────────────────────────────
  tmas-container-scan:
    name: TMAS – Container Image Scan
    runs-on: ubuntu-22.04
    needs: build-image
    steps:
      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Install curl and jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq
          echo "curl $(curl --version | head -1)"
          echo "jq $(jq --version)"

      - name: TMAS – Scan container image (all scanners)
        uses: trendmicro/tmas-scan-action@v2
        with:
          version: "2"
          vulnerabilitiesScan: true
          malwareScan: true
          secretsScan: true
          artifact: docker-archive:${{ needs.build-image.outputs.tarball }}
          additionalArgs: >
            --region=${{ vars.TMAS_REGION || 'us-east-1' }}
            --saveSBOM
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: SBOM.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 5: Deploy to Kubernetes
  # Runs only on push to main after image build + TMAS scan both pass
  # ──────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-22.04
    needs: [tmas-container-scan, tmas-source-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://nodejs-app.example.com   # update to your real URL
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install curl and jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq
          echo "curl $(curl --version | head -1)"
          echo "jq $(jq --version)"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubectl (kubeconfig)
        # KUBECONFIG_B64: base64-encoded kubeconfig stored as a GitHub secret
        # Generate with: cat ~/.kube/config | base64 -w 0
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Validate manifests (dry-run)
        run: |
          kubectl apply \
            -f k8s/namespace.yaml \
            -f k8s/configmap.yaml \
            -f k8s/deployment.yaml \
            -f k8s/service.yaml \
            -f k8s/hpa.yaml \
            -f k8s/pdb.yaml \
            --dry-run=client

      - name: Apply Kubernetes manifests
        run: |
          # Apply in dependency order
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/pdb.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Update deployment image to newly pushed SHA
        run: |
          GHCR_IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
          kubectl set image deployment/nodejs-app \
            nodejs-app=${GHCR_IMAGE}:${{ env.IMAGE_TAG }} \
            -n nodejs-app

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/nodejs-app \
            -n nodejs-app \
            --timeout=120s

      - name: Verify deployment health
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n nodejs-app -l app=nodejs-app

          echo ""
          echo "=== Deployment details ==="
          kubectl get deployment nodejs-app -n nodejs-app -o json \
            | jq '{
                name: .metadata.name,
                namespace: .metadata.namespace,
                image: .spec.template.spec.containers[0].image,
                replicas: .spec.replicas,
                ready: .status.readyReplicas,
                available: .status.availableReplicas
              }'

          echo ""
          echo "=== Service ==="
          kubectl get svc nodejs-app-svc -n nodejs-app

          echo ""
          echo "=== HPA ==="
          kubectl get hpa nodejs-app-hpa -n nodejs-app

      - name: Smoke test via kubectl port-forward
        run: |
          # Forward the service port in background, wait, then curl the health endpoint
          kubectl port-forward svc/nodejs-app-svc 8080:80 -n nodejs-app &
          PF_PID=$!
          sleep 5

          echo "=== Health check ==="
          RESPONSE=$(curl -sf http://localhost:8080/health)
          echo "$RESPONSE" | jq .

          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          if [ "$STATUS" != "healthy" ]; then
            echo "❌ Smoke test failed — expected status=healthy, got: $STATUS"
            kill $PF_PID
            exit 1
          fi

          echo "✓ Smoke test passed"
          kill $PF_PID
