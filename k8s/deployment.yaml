apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
  namespace: nodejs-app
  labels:
    app.kubernetes.io/name: nodejs-container-app
    app.kubernetes.io/component: web
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # allow 1 extra pod during rollout
      maxUnavailable: 0  # never take pods down before new ones are ready
  template:
    metadata:
      labels:
        app: nodejs-app
        app.kubernetes.io/name: nodejs-container-app
        app.kubernetes.io/component: web
    spec:
      # ── Security Context (pod level) ───────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # ── Graceful shutdown ──────────────────────────────────────────────────
      terminationGracePeriodSeconds: 30

      containers:
        - name: nodejs-app
          # Replace with your registry image after pushing:
          # image: ghcr.io/<YOUR_USERNAME>/nodejs-container-app:<TAG>
          image: nodejs-container-app:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # ── Environment from ConfigMap ─────────────────────────────────────
          envFrom:
            - configMapRef:
                name: nodejs-app-config

          # ── Container Security Context ─────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # ── Resource Limits ────────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # ── Liveness Probe ─────────────────────────────────────────────────
          # Restarts the container if the app stops responding
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          # ── Readiness Probe ────────────────────────────────────────────────
          # Removes pod from Service endpoints until it is truly ready
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # ── Startup Probe ──────────────────────────────────────────────────
          # Gives the app up to 60s to start before liveness kicks in
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 12
            periodSeconds: 5

          # ── Volume Mounts (required for readOnlyRootFilesystem) ────────────
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      # ── Volumes ─────────────────────────────────────────────────────────────
      volumes:
        - name: tmp
          emptyDir: {}
